[project]
name = "identity-levels-inchi"
version = "0.1.0"
description = "Identity Levels Comparator for InChI with lipid-aware substituent independence"
authors = [
    { name = "alejandraoshea", email = "alejandraosheafdez@gmail.com" }
]
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "numpy>=1.23",
    "pandas",
    "requests",
    "flask",
    "flask-cors",
    "python-dotenv"
]

keywords = ["chemistry", "inchi", "rdkit", "lipids", "cheminformatics"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"